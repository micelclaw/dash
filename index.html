<!DOCTYPE html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="google" content="notranslate" />
    <meta name="theme-color" content="#06060a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Micelclaw</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Splash screen: OUTSIDE #root so React doesn't destroy it. Removed by main.tsx after mount. -->
    <div id="splash" style="
      position:fixed;inset:0;z-index:9999;
      display:none;align-items:center;justify-content:center;
      background:#06060a;
    ">
      <img src="/splashscreen.png" alt="" style="width:100%;height:100%;object-fit:cover;" />
    </div>
    <div id="root"></div>
    <script>
      // Only show splash in PWA mode (fullscreen or standalone), not in desktop browser
      if (window.matchMedia('(display-mode: fullscreen)').matches || window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
        document.getElementById('splash').style.display = 'flex';
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
